<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - KAPLAY</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="status">Press SPACE to start or R to restart</div>
        </div>
        <canvas></canvas>
        <div id="instructions">
            Desktop: Arrow keys to move, SPACE to start, R to restart<br>
            Mobile: Swipe to move, tap to start or restart
        </div>
    </div>
    
    <script src="https://unpkg.com/kaplay/dist/kaplay.js"></script>
    <script src="game.js"></script>
</body>
</html>
