<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Wheel</title>
    <script>
      function buildSvg(circles) {
        return `<svg width="100%" height="100%" viewBox="-500 -500 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <circle cx="0" cy="0" r="450" fill="none" stroke="black" stroke-width="2">
              <!-- frame -->
            </circle>
            <circle cx="0" cy="0" r="150" fill="none" stroke="black" stroke-width="2">
              <!-- center -->
            </circle>
          ${circles.map(circle => `
            <circle cx="${circle.cx}" cy="${circle.cy}" r="150" fill="none" stroke="black" stroke-width="2"></circle>
          `).join('')}
        </svg>`;
      }
      function drawWheel() {
        const circleCount = 6;
        const circles = [];
        for (let i = 0; i < circleCount; i++) {
          const angle = (i / circleCount) * 2 * Math.PI;
          const cx = 300 * Math.sin(angle);
          const cy = 300 * -Math.cos(angle);
          circles.push({ cx, cy });
        }
        console.log({circles});
        document.getElementById('wheel').innerHTML = buildSvg(circles);
      }
    </script>
</head>
<body onload="drawWheel()">
  <div id="wheel"></div>
</body>
</html>
